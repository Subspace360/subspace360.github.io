<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS App Simulation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
}

/* ===== Phone Frame ===== */
.phone {
  width: 320px;
  height: 640px;
  border-radius: 40px;
  overflow: hidden;
  background: #000;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}

/* ===== Status Bar ===== */
.status-bar {
  height: 30px;
  padding: 5px 12px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: white;
  position: absolute;
  width: 100%;
  z-index: 10;
}

/* ===== Screens ===== */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  transition: transform 0.6s ease;
}

/* Home Screen */
.home {
  background: linear-gradient(180deg, #4facfe, #00f2fe);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
}

/* App Screen */
.app {
  background: linear-gradient(180deg, #f8fbff, #e9f0ff);
  transform: translateX(100%);
  padding: 60px 20px;
}

/* Active state */
.open .home {
  transform: translateX(-100%);
}
.open .app {
  transform: translateX(0);
}

/* ===== App Icon ===== */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

.app-icon {
  width: 70px;
  height: 70px;
  border-radius: 18px;
  background: linear-gradient(180deg, #ff9a9e, #fad0c4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  color: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.2s;
}

.app-icon:active {
  transform: scale(0.85);
}

/* ===== Card ===== */
.card {
  margin-top: 60px;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  animation: fadeIn 0.6s ease;
}

/* ===== Button ===== */
.button {
  margin-top: 20px;
  display: inline-block;
  padding: 14px 28px;
  border-radius: 999px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  background: linear-gradient(180deg, #34c759, #28a745);
  box-shadow: 0 6px 15px rgba(52,199,89,0.4);
  transition: all 0.2s ease;
}

.button:active {
  transform: scale(0.95);
}

/* ===== Back Button ===== */
.back {
  position: absolute;
  top: 35px;
  left: 15px;
  font-size: 18px;
  cursor: pointer;
}

/* ===== Home Indicator ===== */
.home-bar {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 5px;
  border-radius: 10px;
  background: rgba(255,255,255,0.6);
}

/* Animations */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="phone" id="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <div>9:41</div>
    <div>📶 🔋</div>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen home">
    <div class="icon-grid">
      <div class="app-icon" onclick="openApp()">🎮</div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div class="screen app">
    <div class="back" onclick="closeApp()">←</div>

    <div class="card">
      <h2>Rock Paper Scissors</h2>
      <p style="margin-top:8px; color:#555;">Play instantly</p>

      <a class="button" href="https://subspace360.github.io/rock-paper-scissors/" target="_blank">
        Open Game
      </a>
    </div>
  </div>

  <div class="home-bar"></div>

</div>

<!-- Sound -->
<audio id="clickSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
function openApp() {
  document.getElementById("phone").classList.add("open");
  playFeedback();
}

function closeApp() {
  document.getElementById("phone").classList.remove("open");
  playFeedback();
}

function playFeedback() {
  // Sound
  document.getElementById("clickSound").play();

  // Vibration (if supported)
  if (navigator.vibrate) {
    navigator.vibrate(30);
  }
}
</script>

</body>
</html>
